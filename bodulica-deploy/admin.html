<!DOCTYPE html>
<html lang="hr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bodulica Admin</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--font:'DM Sans',system-ui,sans-serif;--radius:8px;--accent:#5bb8f0;--accent2:#4da8e0;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--purple:#a855f7}
[data-theme="dark"]{--bg:#0c1117;--bg2:#151b23;--bg3:#1c232d;--border:#2a3240;--text:#c8d6e5;--text2:#8899aa}
[data-theme="light"]{--bg:#f0f2f5;--bg2:#ffffff;--bg3:#f7f8fa;--border:#e2e6ea;--text:#1a2332;--text2:#5a6a7a}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;transition:background .3s,color .3s}
a{color:var(--accent);text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;border-radius:var(--radius)}
input,select,textarea{font-family:var(--font);background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius);width:100%;font-size:13px;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:70px;resize:vertical}
label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
::placeholder{color:var(--text2);opacity:.5}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px 32px}
.login-box h1{font-size:22px;font-weight:600;text-align:center;margin-bottom:4px}
.login-box p{text-align:center;color:var(--text2);font-size:12px;margin-bottom:28px}
.field{margin-bottom:16px}
.btn-login{width:100%;padding:10px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;border-radius:var(--radius)}
.btn-login:hover{background:var(--accent2)}
.error{color:var(--red);font-size:12px;margin-top:8px;text-align:center;min-height:18px}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:fixed;height:100vh;overflow-y:auto;transition:background .3s}
.logo{padding:0 20px 16px;font-size:18px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);margin-bottom:12px}
.logo span{font-weight:300;color:var(--text2);font-size:11px;display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(91,184,240,.05);color:var(--text)}
.nav-item.active{background:rgba(91,184,240,.08);color:var(--accent);border-left-color:var(--accent)}
.nav-sep{height:1px;background:var(--border);margin:8px 20px}
.main{flex:1;margin-left:220px;padding:24px 32px;max-width:1200px}
.theme-toggle{margin:8px 20px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .2s}
.theme-toggle:hover{border-color:var(--accent);color:var(--text)}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h2{font-size:22px;font-weight:600}
.btn{padding:8px 16px;font-size:13px;font-weight:600;border-radius:var(--radius);display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent)}
.btn-danger{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 10px;font-size:11px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:background .3s}
.stat-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase}
.stat-value{font-size:28px;font-weight:700;margin-top:4px}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase}
.badge-green{background:rgba(34,197,94,.1);color:var(--green)}
.badge-orange{background:rgba(245,158,11,.1);color:var(--orange)}
.badge-red{background:rgba(239,68,68,.1);color:var(--red)}
.badge-blue{background:rgba(91,184,240,.1);color:var(--accent)}
.badge-purple{background:rgba(168,85,247,.1);color:var(--purple)}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;transition:background .3s}
.table-top{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap}
.table-top input{max-width:260px}
table{width:100%;border-collapse:collapse;min-width:600px}
thead{background:var(--bg3)}
th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;white-space:nowrap}
td{padding:10px 16px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(91,184,240,.02)}
.thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0}
.thumb-placeholder{width:40px;height:40px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.product-row{cursor:pointer;transition:background .15s}
.product-row:hover td{background:rgba(91,184,240,.04)!important}
.product-row td:first-child{display:flex;align-items:center;gap:12px}

/* Expandable inline edit */
.expand-row{display:none}
.expand-row.open{display:table-row}
.expand-row td{padding:0!important;border-top:none!important}
.expand-content{padding:20px;background:var(--bg3);border-top:1px solid var(--border);border-bottom:2px solid var(--accent);transition:background .3s}
.expand-content .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.expand-content .form-grid.full{grid-template-columns:1fr}
.expand-content .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.expand-content .img-preview{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.expand-content .img-preview img{width:80px;height:80px;border-radius:8px;object-fit:cover;border:2px solid var(--border)}
.expand-content .img-preview .img-placeholder{width:80px;height:80px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:28px;border:2px dashed var(--border)}
.upload-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text2);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upload-btn:hover{border-color:var(--accent);color:var(--text)}
.upload-btn input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-status{font-size:11px;color:var(--accent);margin-top:4px}
.form-hint{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5}

/* New product modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;padding:28px;transition:background .3s}
.modal h3{font-size:18px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.close-btn{background:none;color:var(--text2);font-size:18px;padding:4px;cursor:pointer;border:none}

.guide{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;transition:background .3s}
.guide h3{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.guide p,.guide li{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:8px}
.guide ol{padding-left:20px;margin-bottom:16px}
.tip{background:rgba(91,184,240,.06);border-left:3px solid var(--accent);padding:12px 16px;border-radius:0 var(--radius) var(--radius) 0;margin:12px 0}
.tip p{margin:0!important}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:12px 20px;border-radius:var(--radius);font-weight:500;font-size:13px;z-index:200;animation:slideUp .3s}
.toast.err{background:var(--red)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Touch improvements */
*{-webkit-tap-highlight-color:transparent}
button,select,.nav-item,.product-row,.theme-toggle,.upload-btn{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
@media(hover:none){
  .product-row:active td{background:rgba(91,184,240,.06)!important}
  .btn:active{transform:scale(0.97)}
  .nav-item:active{background:rgba(91,184,240,.1)}
}
.hide-mobile{}
@media(max-width:768px){.hide-mobile{display:none}}
/* ═══ MOBILE MENU ═══ */
.mobile-header{display:none;position:fixed;top:0;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;z-index:50;align-items:center;justify-content:space-between}
.mobile-header .logo-m{font-size:16px;font-weight:700;color:var(--accent)}
.hamburger{background:none;border:none;color:var(--text);font-size:22px;padding:4px 8px;cursor:pointer}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
.sidebar.mobile-open{display:flex!important;flex-direction:column;position:fixed;z-index:95;left:0;top:0;width:260px;height:100vh;box-shadow:4px 0 20px rgba(0,0,0,.3)}

@media(max-width:768px){
  .mobile-header{display:flex}
  .sidebar{display:none}
  .main{margin-left:0;padding:60px 12px 16px}
  .page-header{flex-direction:column;align-items:flex-start;gap:8px}
  .page-header h2{font-size:18px}
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{padding:14px}
  .stat-value{font-size:22px}
  .table-wrap{border-radius:6px}
  .table-top{padding:10px 12px}
  .table-top input{max-width:100%;flex:1}
  table{min-width:auto!important;font-size:12px}
  th,td{padding:8px 10px}
  .expand-content{padding:14px}
  .expand-content .form-grid{grid-template-columns:1fr}
  .expand-content .img-preview{flex-direction:column;align-items:flex-start}
  .modal{padding:20px;margin:10px;max-width:calc(100vw - 20px)}
  .modal-overlay{padding:10px}
  .modal .form-grid{grid-template-columns:1fr!important}
  .btn{padding:10px 16px;font-size:14px}
  .btn-sm{padding:7px 12px;font-size:12px}
  input,select,textarea{padding:10px 12px;font-size:14px}
  .product-row td:first-child{flex-direction:column;gap:6px;align-items:flex-start}
  .badge{font-size:9px;padding:2px 6px}
  .upload-btn{padding:10px 16px;font-size:13px}
  .nav-item{padding:14px 20px;font-size:14px}
  .theme-toggle{margin:12px 20px;padding:12px}
  .guide{padding:16px}
}
@media(max-width:400px){
  .stats{grid-template-columns:1fr}
  .form-actions{flex-direction:column}
  .form-actions .btn{width:100%;justify-content:center}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
var API="https://mbputwgppweoeujiszgv.supabase.co/functions/v1/bodulica-api";
var token=localStorage.getItem("bod-admin-token");
var theme=localStorage.getItem("bod-admin-theme")||"dark";
var page="dashboard",products=[],orders=[],stats={},expandedId=null,expandedOrderId=null,showNewModal=false,search="";
document.documentElement.setAttribute("data-theme",theme);
var CATS=[{v:"moda",l:"Moda"},{v:"delicije",l:"Delicije"},{v:"kozmetika",l:"Kozmetika"},{v:"rucni-rad",l:"Ru\u010dni radovi"},{v:"art",l:"Art"},{v:"djeca",l:"Djeca"}];
var ST={pending:{l:"Na \u010dekanju",c:"badge-orange"},paid:{l:"Pla\u0107eno",c:"badge-green"},processing:{l:"U pripremi",c:"badge-blue"},shipped:{l:"Poslano",c:"badge-purple"},delivered:{l:"Dostavljeno",c:"badge-green"},cancelled:{l:"Otkazano",c:"badge-red"}};

function toggleTheme(){theme=theme==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",theme);localStorage.setItem("bod-admin-theme",theme);render();}

function apiCall(path,method,body){
  method=method||"GET";
  var opts={method:method,headers:{"Content-Type":"application/json"}};
  if(token)opts.headers["Authorization"]="Bearer "+token;
  if(body)opts.body=JSON.stringify(body);
  // Ensure path starts with / and API doesn't end with /
  var fullUrl = API.replace(/\/$/, "") + "/" + path.replace(/^\//, "");
  return fetch(fullUrl,opts).then(function(r){
    return r.json().then(function(data){
      if(r.status===401){token=null;localStorage.removeItem("bod-admin-token");render();throw new Error("Neovlašteni pristup");}
      if(r.status>=400)throw new Error(data.error||"Greška");
      return data;
    });
  });
}

function uploadFile(file,callback){
  var fd=new FormData();fd.append("file",file);
  fetch(API+"/api/upload-image",{method:"POST",headers:{"Authorization":"Bearer "+token},body:fd})
  .then(function(r){return r.json();})
  .then(function(d){if(d.error)throw new Error(d.error);callback(null,d.url);})
  .catch(function(e){callback(e.message);});
}

function login(){
  var pass=document.getElementById("loginPass").value;
  var err=document.getElementById("loginError");err.textContent="";
  apiCall("/api/login","POST",{password:pass}).then(function(d){
    if(d.ok){token=d.token;localStorage.setItem("bod-admin-token",token);loadData().then(render);}
  }).catch(function(e){err.textContent=e.message;});
}
function logout(){token=null;localStorage.removeItem("bod-admin-token");render();}
function loadData(){return Promise.all([apiCall("/api/stats"),apiCall("/api/products"),apiCall("/api/orders")]).then(function(r){stats=r[0];products=r[1];orders=r[2];}).catch(function(e){console.error(e);});}

function saveProduct(isNew){
  var prefix=isNew?"new-":"edit-";
  var data={
    name:document.getElementById(prefix+"name").value,
    brand:document.getElementById(prefix+"brand").value||null,
    category:document.getElementById(prefix+"category").value,
    price:parseFloat(document.getElementById(prefix+"price").value),
    stock_quantity:parseInt(document.getElementById(prefix+"stock").value)||0,
    is_active:document.getElementById(prefix+"active").value==="true",
    is_unique:document.getElementById(prefix+"unique").value==="true",
    description:document.getElementById(prefix+"desc").value||null,
    dimensions:document.getElementById(prefix+"dims").value||null,
    materials:document.getElementById(prefix+"mats").value||null,
    image_url:document.getElementById(prefix+"imgurl").value||null,
    stripe_price_id:document.getElementById(prefix+"stripe")? document.getElementById(prefix+"stripe").value||null : null
  };
  var id=isNew?null:expandedId;
  var promise=id?apiCall("/api/products/"+id,"PUT",data):apiCall("/api/products","POST",data);
  promise.then(function(){
    toast(id?"Proizvod a\u017euriran":"Proizvod kreiran");
    expandedId=null;showNewModal=false;return loadData();
  }).then(render).catch(function(e){toast(e.message,true);});
}

function deleteProduct(id){
  if(!confirm("Obrisati ovaj proizvod?"))return;
  apiCall("/api/products/"+id,"DELETE").then(function(){toast("Obrisano");return loadData();}).then(render).catch(function(e){toast(e.message,true);});
}
function updateOrderStatus(id,status){
  apiCall("/api/orders/"+id,"PUT",{status:status}).then(function(){toast("Status a\u017euriran");return loadData();}).then(render).catch(function(e){toast(e.message,true);});
}

function handleUpload(inputEl,previewId,urlFieldId,statusId){
  var file=inputEl.files[0];if(!file)return;
  var st=document.getElementById(statusId);st.textContent="Uploading...";
  uploadFile(file,function(err,url){
    if(err){st.textContent="\u274c "+err;return;}
    document.getElementById(urlFieldId).value=url;
    var prev=document.getElementById(previewId);
    if(prev)prev.innerHTML='<img src="'+url+'" style="width:80px;height:80px;border-radius:8px;object-fit:cover;border:2px solid var(--border)">';
    st.textContent="\u2705 Uploadano";
  });
}

function toast(msg,isErr){var el=document.createElement("div");el.className="toast"+(isErr?" err":"");el.textContent=msg;document.body.appendChild(el);setTimeout(function(){el.remove();},3000);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtDate(d){if(!d)return"\u2014";return new Date(d).toLocaleDateString("hr-HR",{day:"numeric",month:"short",year:"numeric"});}
function bdg(s){var x=ST[s]||{l:s,c:"badge-orange"};return '<span class="badge '+x.c+'">'+x.l+'</span>';}
function catLabel(c){var x=CATS.find(function(i){return i.v===c;});return x?x.l:c;}
function catOpts(sel){return '<option value="">-- Odaberi --</option>'+CATS.map(function(c){return '<option value="'+c.v+'" '+(sel===c.v?"selected":"")+'>'+c.l+'</option>';}).join("");}

function orderDetails(o){
  var h='<div class="form-grid"><div><label>Kupac</label><div style="font-size:14px;font-weight:600">'+esc(o.customer_name||"\u2014")+'</div></div><div><label>Email</label><div style="font-size:13px">'+esc(o.customer_email||"\u2014")+'</div></div></div>';
  h+='<div class="form-grid"><div><label>Telefon</label><div style="font-size:13px">'+esc(o.customer_phone||"\u2014")+'</div></div><div><label>Datum narud\u017ebe</label><div style="font-size:13px">'+fmtDate(o.created_at)+'</div></div></div>';
  h+='<div style="margin:16px 0 8px;border-top:1px solid var(--border);padding-top:12px"><label>Adresa za dostavu</label></div>';
  h+='<div class="form-grid"><div><div style="font-size:13px"><strong>'+esc(o.shipping_name||o.customer_name||"\u2014")+'</strong></div>';
  h+='<div style="font-size:13px;color:var(--text2)">'+esc(o.shipping_address||"Nije unesena")+'</div>';
  h+='<div style="font-size:13px;color:var(--text2)">'+esc([o.shipping_postal_code,o.shipping_city].filter(Boolean).join(" ")||"")+'</div>';
  h+='<div style="font-size:13px;color:var(--text2)">'+esc(o.shipping_country||"")+'</div></div>';
  h+='<div><label>Pla\u0107anje</label><div style="font-size:13px">Ukupno: <strong>'+parseFloat(o.total||0).toFixed(2)+' \u20ac</strong></div>';
  h+='<div style="font-size:12px;color:var(--text2)">Proizvodi: '+parseFloat(o.subtotal||0).toFixed(2)+' \u20ac</div>';
  h+='<div style="font-size:12px;color:var(--text2)">Dostava: '+parseFloat(o.shipping_cost||0).toFixed(2)+' \u20ac</div></div></div>';
  if(o.items&&o.items.length){
    h+='<div style="margin:16px 0 8px;border-top:1px solid var(--border);padding-top:12px"><label>Naru\u010deni proizvodi</label></div>';
    h+='<table style="min-width:auto"><thead><tr><th>Proizvod</th><th>Kol.</th><th>Cijena</th><th>Ukupno</th></tr></thead><tbody>';
    o.items.forEach(function(it){
      h+='<tr><td>'+esc(it.product_name)+'</td><td>'+it.quantity+'</td><td>'+parseFloat(it.unit_price||0).toFixed(2)+' \u20ac</td><td>'+parseFloat(it.total_price||0).toFixed(2)+' \u20ac</td></tr>';
    });
    h+='</tbody></table>';
  }
  return h;
}

function render(){
  var app=document.getElementById("app");
  if(!token){
    app.innerHTML='<div class="login-wrap"><div class="login-box"><h1>\ud83c\udfe0 Bodulica</h1><p>Admin Panel</p><div class="field"><label>Admin lozinka</label><input type="password" id="loginPass" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022"></div><button class="btn-login" id="btnLogin">Prijavi se</button><div class="error" id="loginError"></div></div></div>';
    document.getElementById("btnLogin").onclick=login;
    document.getElementById("loginPass").onkeydown=function(e){if(e.key==="Enter")login();};
    return;
  }
  var navItems=[{id:"dashboard",icon:"\ud83d\udcca",label:"Pregled"},{id:"products",icon:"\ud83d\udecd\ufe0f",label:"Proizvodi"},{id:"orders",icon:"\ud83d\udce6",label:"Narud\u017ebe"},{id:"guide",icon:"\ud83d\udcb3",label:"Vodi\u010d"}];
  var navHtml=navItems.map(function(i){return '<div class="nav-item '+(page===i.id?"active":"")+'" data-page="'+i.id+'">'+i.icon+" "+i.label+'</div>';}).join("");
  var themeIcon=theme==="dark"?"\u2600\ufe0f Svijetli":"\ud83c\udf19 Tamni";
  app.innerHTML='<div class="mobile-header"><span class="logo-m">Bodulica</span><button class="hamburger" id="menuBtn">\u2630</button></div><div class="mobile-overlay" id="mobileOverlay"></div><div class="sidebar"><div class="logo">Bodulica<span>Admin Panel</span></div>'+navHtml+'<div class="nav-sep"></div><div class="theme-toggle" id="themeBtn">'+themeIcon+'</div><div class="nav-item" id="btnLogout">\ud83d\udeaa Odjavi se</div></div><div class="main" id="mainContent"></div>';
  document.querySelectorAll(".nav-item[data-page]").forEach(function(el){el.onclick=function(){page=el.dataset.page;search="";expandedId=null;render();};});
  document.getElementById("btnLogout").onclick=logout;
  document.getElementById("themeBtn").onclick=toggleTheme;
  var menuBtn=document.getElementById("menuBtn");
  var mobileOverlay=document.getElementById("mobileOverlay");
  if(menuBtn){
    menuBtn.onclick=function(){
      document.querySelector(".sidebar").classList.toggle("mobile-open");
      mobileOverlay.style.display=mobileOverlay.style.display==="block"?"none":"block";
    };
    mobileOverlay.onclick=function(){
      document.querySelector(".sidebar").classList.remove("mobile-open");
      mobileOverlay.style.display="none";
    };
  }
  document.querySelectorAll(".nav-item[data-page]").forEach(function(el){
    var origClick=el.onclick;
    el.onclick=function(){
      page=el.dataset.page;search="";expandedId=null;
      document.querySelector(".sidebar").classList.remove("mobile-open");
      if(mobileOverlay)mobileOverlay.style.display="none";
      render();
    };
  });
  document.getElementById("mainContent").innerHTML=renderPage();
  bindEvents();
}

function renderPage(){
  if(page==="dashboard")return renderDash();
  if(page==="products")return renderProds();
  if(page==="orders")return renderOrds();
  if(page==="guide")return renderGuide();
  return "";
}

function bindEvents(){
  var addBtn=document.getElementById("btnAdd");
  if(addBtn)addBtn.onclick=function(){showNewModal=true;render();};

  // Search without re-render
  var searchEl=document.getElementById("searchInput");
  if(searchEl){
    searchEl.value=search;
    searchEl.focus();
    searchEl.oninput=function(){
      search=searchEl.value.toLowerCase();
      document.querySelectorAll(".product-row").forEach(function(row){
        var text=row.textContent.toLowerCase();
        var id=row.dataset.toggle;
        var show=!search||text.indexOf(search)>=0;
        row.style.display=show?"":"none";
        var exp=document.getElementById("expand-"+id);
        if(exp&&!show)exp.classList.remove("open");
      });
    };
  }

  // Toggle expand rows
  document.querySelectorAll(".product-row[data-toggle]").forEach(function(row){
    row.onclick=function(){
      var id=row.dataset.toggle;
      if(expandedId===id){expandedId=null;}else{expandedId=id;}
      render();
    };
  });

  // Expand row buttons
  document.querySelectorAll("[data-save]").forEach(function(el){el.onclick=function(e){e.stopPropagation();saveProduct(false);};});
  document.querySelectorAll("[data-cancel]").forEach(function(el){el.onclick=function(e){e.stopPropagation();expandedId=null;render();};});
  document.querySelectorAll("[data-del]").forEach(function(el){el.onclick=function(e){e.stopPropagation();deleteProduct(el.dataset.del);};});

  // Edit file upload
  var editFile=document.getElementById("edit-fileInput");
  if(editFile)editFile.onchange=function(){handleUpload(editFile,"edit-imgpreview","edit-imgurl","edit-uploadStatus");};

  // Order status
  document.querySelectorAll("[data-otoggle]").forEach(function(row){
    row.onclick=function(e){
      if(e.target.tagName==="SELECT"||e.target.tagName==="OPTION")return;
      var id=row.dataset.otoggle;
      expandedOrderId=expandedOrderId===id?null:id;
      render();
    };
  });
  document.querySelectorAll(".order-status").forEach(function(el){el.onchange=function(){updateOrderStatus(el.dataset.oid,el.value);};});

  // New product modal
  var overlay=document.getElementById("modalOverlay");
  if(overlay){
    overlay.onclick=function(e){if(e.target===overlay){showNewModal=false;render();}};
    document.getElementById("modalClose").onclick=function(){showNewModal=false;render();};
    document.getElementById("modalCancel").onclick=function(){showNewModal=false;render();};
    document.getElementById("modalSave").onclick=function(){saveProduct(true);};
    var newFile=document.getElementById("new-fileInput");
    if(newFile)newFile.onchange=function(){handleUpload(newFile,"new-imgpreview","new-imgurl","new-uploadStatus");};
  }
}

// Image upload handling
document.getElementById('product-image-file').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const preview = document.getElementById('image-preview');
    preview.src = ev.target.result;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

async function uploadImage(file) {
  const formData = new FormData();
  formData.append('file', file);
  const res = await fetch(API_BASE + '/upload-image', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY },
    body: formData
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Upload failed');
  return data.url;
}
