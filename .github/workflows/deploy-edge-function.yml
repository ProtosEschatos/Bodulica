name: Deploy Supabase Edge Function

on:
  push:
    branches: [main]
    paths:
      - supabase/functions/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase functions deploy bodulica-api --project-ref $SUPABASE_PROJECT_ID

      - name: Verify Deployment
        run: |
          echo "Edge Function deployed. Testing..."
          curl -sf https://$SUPABASE_PROJECT_ID.supabase.co/functions/v1/bodulica-api/products || echo "Note: Function may need a moment to warm up"
